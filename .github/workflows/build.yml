name: Build All Targets

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # First job: read BuildConfigs.json and output a matrix
  enumerate:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - id: set-matrix
        run: |
          # Extract keys and target_locations into a JSON array
          MATRIX=$(jq -c '[to_entries[] | {config_key: .key, target: .value.target_location}]' BuildConfigs.json)
          echo "matrix=${MATRIX}" >> "$GITHUB_OUTPUT"

  # Second job: build each config in parallel
  build:
    needs: enumerate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.enumerate.outputs.matrix) }}

    name: "Build ${{ matrix.config_key }}"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi ninja-build

      - name: Configure CMake
        run: |
          cmake -B build/${{ matrix.config_key }} \
            -S ${{ matrix.target }} \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ matrix.target }}/cmake/gcc-arm-none-eabi.cmake \
            -DPINECAN_CONFIG_KEY=${{ matrix.config_key }} \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/${{ matrix.config_key }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config_key }}
          path: |
            build/${{ matrix.config_key }}/**/*.elf
            build/${{ matrix.config_key }}/**/*.bin
            build/${{ matrix.config_key }}/**/*.hex